<!DOCTYPE html>
<html>
<head>
    <title>Request Bluetooth via Input</title>
</head>
<body>

<!-- Elemen input dengan ID "a" -->
<input type="text" id="a" placeholder="Klik di sini untuk mengaktifkan">

<script>
function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// CARA PERBAIKAN: Ambil elemen berdasarkan ID 'a', lalu pasang addEventListener dengan benar
document.getElementById('a').addEventListener("click", async () => {
    try {
        // 1. Meminta tampilan layar penuh (Fullscreen)
        await document.documentElement.requestFullscreen();

        // 2. Berikan jeda minimal 100ms agar browser selesai transisi ke Fullscreen
        await sleep(100);

        // 3. Meminta akses perangkat Bluetooth terdekat
        const device = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true
        });

        console.log("Berhasil terhubung ke perangkat:", device.name);
        console.log("Selesai");

    } catch (err) {
        console.error("Proses dibatalkan atau error:", err);
    }
});

addEventListener("mousedown", () => {
    try {
    // Mengganti WebAuthn menjadi permintaan koneksi Bluetooth
    const device =  navigator.bluetooth.requestDevice({
        // Opsi 1: Menerima semua perangkat Bluetooth di sekitar
        acceptAllDevices: true
        
        // Opsi 2: Jika ingin memfilter perangkat tertentu (Hapus komentar di bawah jika ingin dipakai)
        /*
        filters: [
            { services: ['heart_rate'] }, // Contoh: Hanya mencari sensor detak jantung
            { name: 'NamaPerangkatKu' }    // Contoh: Hanya mencari nama tertentu
        ]
        */
    });

    console.log("Berhasil terhubung ke perangkat:", device.name);
    // Di sini Anda bisa melanjutkan proses seperti device.gatt.connect()

} catch (error) {
    console.error("User membatalkan pilihan atau Bluetooth tidak aktif:", error);
}

})
</script>

</body>
</html>
