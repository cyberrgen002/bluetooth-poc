<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Teks Bluetooth</title>
</head>
<body>

    <h2>Kirim Teks via Bluetooth</h2>


    <br><br>

    <!-- Input teks dengan fitur fullscreen saat diklik -->
<input type="text" name="" id="connectBtn" onclick="document.documentElement.requestFullscreen()">    <button id="sendBtn" disabled>2. Kirim Data</button>

    <p id="status">Status: Belum terhubung.</p>

    <script>
        

        // 1. Fungsi untuk menghubungkan ke perangkat Bluetooth
        document.getElementById('connectBtn').addEventListener('keydown', async () => {
            const statusText = document.getElementById('status');
            try {
                statusText.innerText = "Status: Mencari perangkat...";

                // Meminta izin akses perangkat BLE
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['generic_attribute'] // Ganti dengan UUID layanan perangkat Anda
                });

                statusText.innerText = `Status: Menghubungkan ke ${device.name}...`;
                const server = await device.gatt.connect();

                // Mendapatkan layanan dan karakteristik untuk menulis data
                const service = await server.getPrimaryService('generic_attribute'); // Ganti dengan UUID layanan Anda
                bluetoothCharacteristic = await service.getCharacteristic('gap.device_name'); // Ganti dengan UUID karakteristik Anda

                statusText.innerText = `Status: Terhubung dengan ${device.name}!`;
                
                // Aktifkan input dan tombol kirim
                document.getElementById('textInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
            } catch (error) {
                statusText.innerText = `Error: ${error.message}`;
                console.error(error);
            }
        });

        // 2. Fungsi untuk mengirim teks saat tombol diklik
        document.getElementById('sendBtn').addEventListener('click', async () => {
            const inputText = document.getElementById('textInput').value;
            const statusText = document.getElementById('status');

            if (!bluetoothCharacteristic) {
                statusText.innerText = "Status: Karakteristik Bluetooth tidak ditemukan.";
                return;
            }

            try {
                // Mengubah teks string menjadi ArrayBuffer / Encoder Bytes
                const encoder = new TextEncoder();
                const dataBuffer = encoder.encode(inputText);

                // Memicu event pengiriman data ke perangkat Bluetooth
                await bluetoothCharacteristic.writeValue(dataBuffer);
                statusText.innerText = `Status: Berhasil mengirim "${inputText}"`;
            } catch (error) {
                statusText.innerText = `Gagal mengirim: ${error.message}`;
            }
        });
    </script>
</body>
</html>
